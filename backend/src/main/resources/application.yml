spring:
  application:
    name: ClaimChain
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

security:
  bootstrap:
    admin-token: ${ADMIN_BOOTSTRAP_TOKEN:}
  jwt:
    # In prod, do NOT set a default. Must be provided via env JWT_SECRET
    secret: ${JWT_SECRET}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}
    refresh-expiration-millis: ${JWT_REFRESH_EXPIRATION_MILLIS:2592000000}
    password-reset-expiration-millis: ${JWT_PASSWORD_RESET_EXPIRATION_MILLIS:900000}

documents:
  max-bytes: ${DOCUMENTS_MAX_BYTES:10000000}
  allowed-types: ${DOCUMENTS_ALLOWED_TYPES:application/pdf,image/png,image/jpeg}

storage:
  local:
    base-dir: ${STORAGE_LOCAL_BASE_DIR:storage/dev}

claimchain:
  stripe:
    secretKey: ${STRIPE_SECRET_KEY:}
    webhookSecret: ${STRIPE_WEBHOOK_SECRET:}
    successUrl: ${STRIPE_SUCCESS_URL:http://localhost:3000/stripe/success}
    cancelUrl: ${STRIPE_CANCEL_URL:http://localhost:3000/stripe/cancel}
