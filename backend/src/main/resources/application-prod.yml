spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

security:
  jwt:
    # NO DEFAULTS IN PROD — required env vars
    secret: ${JWT_SECRET}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}
