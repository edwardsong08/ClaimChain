spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/claimchaindb}
    username: ${DB_USERNAME:claimchain}
    password: ${DB_PASSWORD:claimchainpw}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/dev-migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    # DEV ONLY default. This must be 256-bit+ after BASE64 decoding.
    # Keep your existing hardcoded secret here as a safe local default:
    secret: ${JWT_SECRET:TcMkSc+I6oZYYFyoGEq3Vw0tbLa9Afz4nMApJILR7il6E6h+sxQLv7vYO4QUzU7DJ/1PNUwhX0q1P3/1gHLbjA==}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}

claimchain:
  cors:
    # Strict default: empty list. To enable locally, set env:
    # CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:}
