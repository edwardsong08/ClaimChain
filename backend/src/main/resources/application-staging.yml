server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:}

claimchain:
  stripe:
    secretKey: ${STRIPE_SECRET_KEY:}
    webhookSecret: ${STRIPE_WEBHOOK_SECRET:}
    successUrl: ${STRIPE_SUCCESS_URL:http://localhost:3000/stripe/success}
    cancelUrl: ${STRIPE_CANCEL_URL:http://localhost:3000/stripe/cancel}
  cors:
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:}
