name: Deploy Backend to Staging (EC2)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: claimchaindb
          POSTGRES_USER: claimchain
          POSTGRES_PASSWORD: claimchain
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U claimchain -d claimchaindb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build + test backend (with Postgres)
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/claimchaindb
          SPRING_DATASOURCE_USERNAME: claimchain
          SPRING_DATASOURCE_PASSWORD: claimchain
        run: |
          chmod +x mvnw
          ./mvnw -q clean test

      - name: Build jar (skip tests)
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -q package -DskipTests

      - name: Find jar
        id: jar
        run: |
          JAR_PATH=$(ls backend/target/*.jar | grep -v "original-" | head -n 1)
          echo "jar=$JAR_PATH" >> $GITHUB_OUTPUT

      - name: Install SSH key
        shell: bash
        run: |
            set -euo pipefail
            set -x
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh

            # Write key using literal heredoc delimiter (prevents interpolation)
            cat > ~/.ssh/id_ed25519 <<'EOF'
            ${{ secrets.STAGING_EC2_SSH_KEY }}
            EOF

            # Normalize CRLF and trim possible leading/trailing blank lines
            sed -i 's/\r$//' ~/.ssh/id_ed25519
            sed -i '1{/^$/d;}' ~/.ssh/id_ed25519
            sed -i '${/^$/d;}' ~/.ssh/id_ed25519

            chmod 600 ~/.ssh/id_ed25519

            # Validate the key file without printing it
            ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null

            # Add host key (avoid failure if ssh-keyscan is flaky)
            ssh-keyscan -T 10 -H "${{ secrets.STAGING_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload jar to EC2
        run: |
          scp -i ~/.ssh/id_ed25519 "${{ steps.jar.outputs.jar }}" \
            ${{ secrets.STAGING_EC2_USER }}@${{ secrets.STAGING_EC2_HOST }}:/opt/claimchain/claimchain-backend.jar

      - name: Restart service
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.STAGING_EC2_USER }}@${{ secrets.STAGING_EC2_HOST }} \
            "sudo systemctl restart claimchain && sudo systemctl status claimchain --no-pager"

      - name: Health check
        run: |
          curl -fsS http://${{ secrets.STAGING_EC2_HOST }}/actuator/health