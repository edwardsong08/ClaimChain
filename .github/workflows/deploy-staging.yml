name: Deploy Backend to Staging (EC2 via SSM)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: claimchaindb
          POSTGRES_USER: claimchain
          POSTGRES_PASSWORD: claimchain
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U claimchain -d claimchaindb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build + test backend (with Postgres)
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/claimchaindb
          SPRING_DATASOURCE_USERNAME: claimchain
          SPRING_DATASOURCE_PASSWORD: claimchain
        run: |
          chmod +x mvnw
          ./mvnw -q clean test

      - name: Build jar (skip tests)
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -q package -DskipTests

      - name: Find jar
        id: jar
        run: |
          JAR_PATH=$(ls backend/target/*.jar | grep -v "original-" | head -n 1)
          echo "jar=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload jar to S3 (artifact)
        id: upload
        run: |
          KEY="claimchain-backend-${GITHUB_SHA}.jar"
          aws s3 cp "${{ steps.jar.outputs.jar }}" "s3://${{ secrets.ARTIFACT_BUCKET }}/${KEY}"
          echo "s3_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 via SSM
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_BUCKET="${{ secrets.ARTIFACT_BUCKET }}"
          S3_KEY="${{ steps.upload.outputs.s3_key }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          # Remote deploy script (must run in bash, not sh)
          REMOTE_CMD="bash -lc '
            set -euo pipefail

            echo \"Downloading artifact from s3://${ARTIFACT_BUCKET}/${S3_KEY}\"
            aws s3 cp \"s3://${ARTIFACT_BUCKET}/${S3_KEY}\" /opt/claimchain/claimchain-backend.jar

            sudo chown claimchain:claimchain /opt/claimchain/claimchain-backend.jar
            sudo chmod 640 /opt/claimchain/claimchain-backend.jar

            echo \"Restarting service\"
            sudo systemctl restart claimchain

            echo \"Waiting for app health on 127.0.0.1:8080 (up to ~60s)\"
            for i in \$(seq 1 30); do
              if curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null; then
                echo \"Health check OK\"
                exit 0
              fi
              sleep 2
            done

            echo \"Health never became OK. Dumping diagnostics...\"
            sudo systemctl status claimchain --no-pager || true
            sudo journalctl -u claimchain --no-pager -n 200 || true
            exit 1
          '"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --comment "Deploy ClaimChain backend ${GITHUB_SHA}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=$REMOTE_CMD" \
            --query "Command.CommandId" \
            --output text)

          echo "CommandId=$COMMAND_ID"

          # Wait for completion (this will fail if SSM reports Failed)
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"

          # Always print output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          if [[ "$STATUS" != "Success" ]]; then
            echo "SSM deploy failed with status: $STATUS"
            exit 1
          fi

      - name: Public health check
        run: |
          curl -fsS http://18.222.221.138/actuator/health